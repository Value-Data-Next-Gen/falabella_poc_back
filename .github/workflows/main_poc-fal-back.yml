# Deploy backend Python a Azure App Service poc-fal-back.
#
# Estrategia (post fix QA 2026-05-22):
#   - Un solo job: checkout → zip → deploy. Sin upload/download artifact
#     intermedio (causaba files stale en wwwroot del container).
#   - Zip explícito antes del deploy, excluyendo lo innecesario.
#   - Oryx build (SCM_DO_BUILD_DURING_DEPLOYMENT=1) instala deps al boot.
#   - clean: true en webapps-deploy borra wwwroot antes de aplicar el zip
#     (evita .pyc viejos / archivos huérfanos).
#   - Restart explícito post-deploy para garantizar reload del módulo.

name: Build and deploy Python app to Azure Web App - poc-fal-back

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create deployment package
        run: |
          # Zip solo lo necesario para el runtime. Excluir:
          #   - .git, .github (metadata)
          #   - __pycache__, *.pyc (bytecode local que confunde a Oryx)
          #   - antenv/ (.venv local; Oryx lo regenera en App Service)
          #   - docs/, *.md, tests/ (no runtime)
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "__pycache__/*" "*/__pycache__/*" \
            -x "*.pyc" \
            -x "antenv/*" ".venv/*" "venv/*" \
            -x "docs/*" "*.md" \
            -x "tests/*" \
            -x "*.db" "*.db-shm" "*.db-wal"
          ls -lh release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8FB8533CB11A4CC892395A42B80FF94B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_690EAEC90401441486B634F354DB5727 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5A7AD340BD9C4323A3A5D448A9838B82 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'poc-fal-back'
          slot-name: 'Production'
          package: 'release.zip'
          clean: true

      - name: Restart Azure Web App
        run: |
          az webapp restart \
            --name poc-fal-back \
            --resource-group poc-fal-_group
