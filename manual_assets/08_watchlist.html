<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .wcard {
    position: relative; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; padding-top: 44px;
  }
  .wcard .eta {
    position: absolute; top: 12px; left: 12px;
    background: #161614; border: 1px solid var(--border); border-radius: 6px;
    padding: 3px 8px; font-family: "Cascadia Mono", monospace; font-size: 11px;
  }
  .wcard .sev { position: absolute; top: 12px; right: 12px; }
  .wcard .reasons { font-size: 11px; color: var(--muted); margin: 8px 0; }
  .wcard .reasons li { margin-left: 16px; }
  .wcard.vip { border-color: var(--yellow); background: linear-gradient(180deg, rgba(255,203,5,0.05), var(--card)); }
</style></head>
<body>
<script src="_layout.js"></script>
<script>
renderShell({
  active: 'operacion',
  breadcrumb: '<b>Operación</b> › Watchlist',
  content: `
    <div class="flex items-center justify-between mb-3">
      <div>
        <div class="h1">Watchlist</div>
        <div class="subtitle-page">87 visitas en riesgo · ordenadas por severity y P(fallo)</div>
      </div>
      <div class="flex gap-2">
        <select class="input" style="width:160px;"><option>Severity: Todas</option></select>
        <select class="input" style="width:160px;"><option>Empresa: Todas</option></select>
        <button class="btn btn-outline">Exportar</button>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-4">

      <div class="wcard vip">
        <div class="eta font-mono">⏱ 14:50</div>
        <div class="sev"><span class="chip chip-red">CRITICAL</span></div>
        <div class="flex items-center gap-2 mb-2">
          <span style="font-weight:700; font-size:14px;">Tienda Costanera Center</span>
          <span class="chip chip-gold">⚜ VIP A · #73259840</span>
        </div>
        <div class="text-xs text-muted">GVFW-70 · Manuel Rojas · Transportes Jorge Cordero</div>
        <div class="text-sm mt-3">Motivo IA: <b style="color:#f87171;">PRODUCTO ROBADO</b></div>
        <ul class="reasons">
          <li>Comentario chofer: "asaltaron al chofer y se llevaron toda la carga"</li>
          <li>Severity catálogo = CRITICAL · alertable = sí</li>
          <li>+ 1 más</li>
        </ul>
        <button class="btn btn-primary" style="margin-top: 4px;">Ver detalle</button>
      </div>

      <div class="wcard">
        <div class="eta font-mono">⏱ 15:08</div>
        <div class="sev"><span class="chip chip-orange">HIGH</span></div>
        <div style="font-weight:700; font-size:14px; margin-bottom: 4px;">F. Castro · Providencia</div>
        <div class="text-xs text-muted">JKLM-22 · Logística Andina</div>
        <div class="text-sm mt-3">Motivo IA: <b style="color:#fb923c;">ZONA INSEGURA</b></div>
        <ul class="reasons">
          <li>Driver reportó "no me dejan entrar al pasaje"</li>
          <li>P(fallo) XGBoost = 0.62</li>
          <li>+ 1 más</li>
        </ul>
        <button class="btn btn-outline" style="margin-top: 4px;">Ver detalle</button>
      </div>

      <div class="wcard">
        <div class="eta font-mono">⏱ 15:30</div>
        <div class="sev"><span class="chip chip-amber">MEDIUM</span></div>
        <div style="font-weight:700; font-size:14px; margin-bottom: 4px;">P. Sepúlveda · Maipú</div>
        <div class="text-xs text-muted">RTYU-04 · Transporte 23 SpA</div>
        <div class="text-sm mt-3">Motivo IA: <b style="color:#fbbf24;">CLIENTE AUSENTE</b></div>
        <ul class="reasons">
          <li>Tercer intento de entrega esta semana</li>
          <li>Sin opt-in WhatsApp del cliente</li>
          <li>+ 1 más</li>
        </ul>
        <button class="btn btn-outline" style="margin-top: 4px;">Ver detalle</button>
      </div>

      <div class="wcard">
        <div class="eta font-mono">⏱ 16:10</div>
        <div class="sev"><span class="chip chip-orange">HIGH</span></div>
        <div style="font-weight:700; font-size:14px; margin-bottom: 4px;">A. Muñoz · La Florida</div>
        <div class="text-xs text-muted">PLOK-91 · Servicios Express Sur</div>
        <div class="text-sm mt-3">Motivo IA: <b style="color:#fb923c;">PRODUCTO DAÑADO</b></div>
        <ul class="reasons">
          <li>Foto del bulto muestra caja aplastada</li>
          <li>Cliente probable rechazo (modelo: 0.71)</li>
          <li>+ 1 más</li>
        </ul>
        <button class="btn btn-outline" style="margin-top: 4px;">Ver detalle</button>
      </div>

    </div>
  `
});
</script>
</body></html>
