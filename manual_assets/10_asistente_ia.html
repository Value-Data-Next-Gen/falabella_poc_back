<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .example {
    background: #1f1f1d; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; font-size: 11px; color: #d4d4d4; margin-bottom: 8px;
    cursor: pointer;
  }
  .example:hover { border-color: var(--green); }
</style></head>
<body>
<script src="_layout.js"></script>
<script>
renderShell({
  active: 'seguimiento',
  breadcrumb: '<b>Seguimiento IA</b> › Asistente',
  content: `
    <div class="h1">Asistente IA · Validar comentarios</div>
    <div class="subtitle-page">Pegá un comentario libre del chofer y la IA lo clasifica con motivo + severity</div>
    <div class="grid" style="grid-template-columns: 2fr 1fr; gap: 16px;">
      <div>
        <div class="card mb-3">
          <label class="label">Comentario del chofer (texto libre)</label>
          <textarea class="input" rows="5" style="font-size:13px; line-height:1.5;">asaltaron al chofer y se llevaron toda la carga, vino la policia y aun estamos en el lugar. el camion quedó vacio.</textarea>
          <div class="flex gap-2 mt-3">
            <button class="btn btn-primary">🤖 Clasificar con IA</button>
            <button class="btn btn-outline">Limpiar</button>
            <div style="flex:1;"></div>
            <span class="text-xs text-muted">Tracking opcional: <span class="font-mono">#73259840</span></span>
          </div>
        </div>

        <div class="card" style="background: linear-gradient(180deg, rgba(220,38,38,0.06), var(--card)); border-color: rgba(220,38,38,0.4);">
          <div class="flex items-center justify-between mb-3">
            <div class="text-xs text-muted">Resultado de clasificación</div>
            <span class="chip chip-green">✓ Azure OpenAI gpt-4o-mini</span>
          </div>
          <div style="font-size: 28px; font-weight: 800; color: #f87171; line-height:1;">PRODUCTO ROBADO</div>
          <div class="flex items-center gap-2 mt-2">
            <span class="chip chip-red">SEVERITY · ALTA</span>
            <span class="chip chip-gray">confianza 0.94</span>
            <span class="chip chip-gray">latencia 1.2 s</span>
          </div>
          <div class="mt-3 text-sm" style="line-height:1.6;">
            <b>Razonamiento de la IA:</b><br/>
            La frase <i>"asaltaron al chofer y se llevaron toda la carga"</i> describe un robo
            consumado de mercadería en ruta. La presencia de la policía y el camión vacío
            confirman pérdida total. Este patrón mapea unívocamente al motivo
            <code style="color:var(--yellow);">PRODUCTO ROBADO</code> del catálogo, con severity
            CRITICAL por riesgo a la integridad del chofer y costo del envío.
          </div>
          <div class="flex gap-2 mt-3">
            <button class="btn btn-primary">Aceptar y enviar alerta</button>
            <button class="btn btn-outline">Cambiar motivo</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="h2 mb-2">Ejemplos rápidos</div>
        <div class="text-xs text-muted mb-3">Click para cargar en el editor</div>
        <div class="example">"el cliente no estaba, dejé aviso de visita."</div>
        <div class="example">"asaltaron al chofer y se llevaron toda la carga"</div>
        <div class="example">"la dirección no existe, número equivocado"</div>
        <div class="example">"caja venía aplastada, cliente no la quiso recibir"</div>
        <div class="example">"el cliente decidió no recibir, no hubo robo"</div>
      </div>
    </div>
  `
});
</script>
</body></html>
