<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
  .reasoning { font-size: 11px; color: #b8b8b8; line-height: 1.45; max-width: 280px; }
  .acc-btn { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; border: none; cursor: pointer; margin-right: 4px; }
  .acc-btn.acc { background: rgba(21,147,73,0.18); color: #4ade80; border: 1px solid rgba(21,147,73,0.5); }
  .acc-btn.rej { background: rgba(220,38,38,0.18); color: #f87171; border: 1px solid rgba(220,38,38,0.5); }
  .acc-btn.skp { background: #3a3a3a; color: #d4d4d4; }
</style></head>
<body>
<script src="_layout.js"></script>
<script>
renderShell({
  active: 'seguimiento',
  breadcrumb: '<b>Seguimiento IA</b> › Correcciones de motivo',
  content: `
    <div class="flex items-center justify-between mb-3">
      <div>
        <div class="h1">Correcciones de motivo</div>
        <div class="subtitle-page">3 pendientes · 27 aceptadas · 4 rechazadas (últ. 7 días)</div>
      </div>
      <div class="flex gap-2">
        <select class="input" style="width:160px;"><option>Estado: Pendientes</option></select>
        <button class="btn btn-outline">Exportar histórico</button>
      </div>
    </div>
    <div class="card" style="padding: 0;">
      <table>
        <thead>
          <tr>
            <th>Tracking</th>
            <th>Motivo reportado</th>
            <th>IA sugiere</th>
            <th>Confianza</th>
            <th>Razonamiento</th>
            <th>Driver</th>
            <th style="width: 220px;">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="font-mono">#73259840</td>
            <td><span class="chip chip-gray">PRODUCTO ROBADO</span></td>
            <td><span class="chip chip-green">CLIENTE RECHAZA ENVIO</span></td>
            <td><b style="color:#fbbf24;">0.88</b></td>
            <td><div class="reasoning">"el cliente decidió no recibir, no hubo robo. Se devolvió la mercadería al CD intacta." → contradice motivo robado.</div></td>
            <td>Manuel Rojas <div class="text-xs text-muted">GVFW-70</div></td>
            <td>
              <button class="acc-btn acc">✓ Aceptar</button>
              <button class="acc-btn rej">✗ Rechazar</button>
              <button class="acc-btn skp">📋 Sin acción</button>
            </td>
          </tr>
          <tr>
            <td class="font-mono">#73261104</td>
            <td><span class="chip chip-gray">CLIENTE AUSENTE</span></td>
            <td><span class="chip chip-green">DIRECCION INCORRECTA</span></td>
            <td><b style="color:#4ade80;">0.92</b></td>
            <td><div class="reasoning">"llegué al pasaje y el número no existe, los vecinos no conocen al destinatario" → patrón típico de dirección errónea, no ausencia.</div></td>
            <td>Pablo Aravena <div class="text-xs text-muted">JKLM-22</div></td>
            <td>
              <button class="acc-btn acc">✓ Aceptar</button>
              <button class="acc-btn rej">✗ Rechazar</button>
              <button class="acc-btn skp">📋 Sin acción</button>
            </td>
          </tr>
          <tr>
            <td class="font-mono">#73263298</td>
            <td><span class="chip chip-gray">OTRO</span></td>
            <td><span class="chip chip-green">PRODUCTO DAÑADO</span></td>
            <td><b style="color:#fbbf24;">0.81</b></td>
            <td><div class="reasoning">"caja venía aplastada y cliente no la quiso, devolvimos al CD" → daño visible es la causa primaria.</div></td>
            <td>Carla Suárez <div class="text-xs text-muted">RTYU-04</div></td>
            <td>
              <button class="acc-btn acc">✓ Aceptar</button>
              <button class="acc-btn rej">✗ Rechazar</button>
              <button class="acc-btn skp">📋 Sin acción</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="text-xs text-muted mt-3">Aceptar una corrección dispara re-clasificación + reenvío de WhatsApp si severity cambia.</div>
  `
});
</script>
</body></html>
