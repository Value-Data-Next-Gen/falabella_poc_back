<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<script src="_layout.js"></script>
<script>
const rows = [
  { e: 'Transportes Jorge Cordero', rut: '76.234.123-4', contactos: 12, optin: '10/12', alerta: 'hace 8 min', sev: 'CRITICAL' },
  { e: 'Transporte 23 SpA',         rut: '77.881.205-9', contactos: 7,  optin: '7/7',   alerta: 'hace 1 h',   sev: 'MEDIUM' },
  { e: 'Logística Andina Ltda.',    rut: '76.554.090-K', contactos: 9,  optin: '5/9',   alerta: 'hace 3 h',   sev: 'HIGH' },
  { e: 'Servicios Express Sur',     rut: '78.110.430-2', contactos: 5,  optin: '5/5',   alerta: 'ayer',       sev: 'MEDIUM' },
  { e: 'Despachos Norte Chico',     rut: '76.998.221-1', contactos: 4,  optin: '0/4',   alerta: '—',          sev: '—' },
];
const sevChip = s => s === '—' ? '<span class="text-muted">—</span>'
  : s === 'CRITICAL' ? '<span class="chip chip-red">CRITICAL</span>'
  : s === 'HIGH' ? '<span class="chip chip-orange">HIGH</span>'
  : '<span class="chip chip-amber">MEDIUM</span>';
const optChip = (o) => {
  const [a,b] = o.split('/').map(Number);
  if (!b) return '<span class="text-muted">—</span>';
  if (a === b) return `<span class="chip chip-green">${o} ✓</span>`;
  if (a === 0) return `<span class="chip chip-red">${o}</span>`;
  return `<span class="chip chip-amber">${o}</span>`;
};
renderShell({
  active: 'maestros',
  breadcrumb: '<b>Maestros</b> › Empresas y contactos',
  content: `
    <div class="flex items-center justify-between mb-3">
      <div>
        <div class="h1">Empresas y contactos</div>
        <div class="subtitle-page">12 empresas transportistas activas · 47 contactos opt-in</div>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-outline">📥 CSV template</button>
        <button class="btn btn-outline">⬆ Importar CSV</button>
        <button class="btn btn-primary">+ Nueva empresa</button>
      </div>
    </div>
    <div class="card" style="padding: 0;">
      <div class="flex gap-2 items-center" style="padding: 12px 16px; border-bottom: 1px solid var(--border);">
        <input class="input" style="max-width: 280px;" placeholder="Buscar empresa, RUT o contacto..." />
        <select class="input" style="max-width: 160px;"><option>Región: Todas</option></select>
        <select class="input" style="max-width: 160px;"><option>Severity: Todos</option></select>
      </div>
      <table>
        <thead>
          <tr>
            <th>Empresa</th><th>RUT</th><th>Contactos</th><th>Opt-in WhatsApp</th><th>Última alerta</th><th>Severity últ.</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><div style="font-weight:600;">${r.e}</div></td>
              <td class="font-mono text-muted">${r.rut}</td>
              <td>${r.contactos}</td>
              <td>${optChip(r.optin)}</td>
              <td class="text-muted">${r.alerta}</td>
              <td>${sevChip(r.sev)}</td>
              <td><a style="color:#4ade80;">Abrir →</a></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `
});
</script>
</body></html>
