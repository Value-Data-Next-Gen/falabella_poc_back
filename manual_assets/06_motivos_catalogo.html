<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<script src="_layout.js"></script>
<script>
const motivos = [
  ['PRODUCTO ROBADO', true,  'CRITICAL', 'Robo de mercadería en ruta o en bodega del transportista.'],
  ['RIESGO FRAUDE', true,    'CRITICAL', 'Patrón sospechoso detectado por modelo (RUT repetido, dirección inválida).'],
  ['DETENCION URGENTE', true,'CRITICAL', 'Detención policial / fiscalización que impide continuar la ruta.'],
  ['ACCIDENTE VEHICULAR', true,'HIGH',   'Colisión, vuelco o falla mecánica que requiere apoyo logístico.'],
  ['CLIENTE AUSENTE',     false,'MEDIUM','Cliente no se encuentra en domicilio al momento de entregar.'],
  ['DIRECCION INCORRECTA',true, 'MEDIUM','Dirección no existe, mal escrita, o dpto. inexistente.'],
  ['CLIENTE RECHAZA ENVIO',true,'MEDIUM','Cliente decide no recibir el producto.'],
  ['PRODUCTO DAÑADO',     true, 'HIGH',  'Bulto llega con daño visible — requiere reposición.'],
  ['PRODUCTO NO CARGADO', true, 'MEDIUM','Bulto no fue cargado en bodega de origen.'],
  ['ZONA INSEGURA',       true, 'HIGH',  'Driver se niega a ingresar por inseguridad pública.'],
  ['VENTANA INCORRECTA',  false,'LOW',   'Cliente pide entregar fuera de la ventana acordada.'],
  ['SIN STOCK BODEGA',    true, 'MEDIUM','Bulto no estaba disponible en bodega al momento de retiro.'],
  ['OTRO',                false,'LOW',   'Motivo no clasificable — requiere revisión manual del operador.'],
];
const sevChip = s => {
  if (s === 'CRITICAL') return '<span class="chip chip-red">CRITICAL</span>';
  if (s === 'HIGH') return '<span class="chip chip-orange">HIGH</span>';
  if (s === 'MEDIUM') return '<span class="chip chip-amber">MEDIUM</span>';
  return '<span class="chip chip-gray">LOW</span>';
};
renderShell({
  active: 'maestros',
  breadcrumb: '<b>Maestros</b> › Catálogo de motivos',
  content: `
    <div class="flex items-center justify-between mb-3">
      <div>
        <div class="h1">Catálogo de motivos</div>
        <div class="subtitle-page">13 motivos · 9 disparan alerta · usados por la IA al clasificar comentarios</div>
      </div>
      <div class="flex gap-2">
        <button class="btn btn-outline">Ver system prompt</button>
        <button class="btn btn-outline">Exportar JSON</button>
        <button class="btn btn-primary">+ Nuevo motivo</button>
      </div>
    </div>
    <div class="card" style="padding: 0;">
      <table>
        <thead>
          <tr><th>Motivo</th><th>Alertable</th><th>Severity por defecto</th><th>Descripción para IA</th></tr>
        </thead>
        <tbody>
          ${motivos.map(([m, a, s, d]) => `
            <tr>
              <td style="font-weight: 600;">${m}</td>
              <td><span class="toggle ${a ? 'on' : ''}"></span></td>
              <td>${sevChip(s)}</td>
              <td class="text-muted">${d}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `
});
</script>
</body></html>
