<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<script src="_layout.js"></script>
<script>
renderShell({
  active: 'maestros',
  breadcrumb: '<b>Maestros</b> › Clientes VIP › Nuevo VIP',
  content: `
    <div class="h1">Nuevo cliente VIP</div>
    <div class="subtitle-page">Definí prioridad, deadline y minutos de aviso. Podés sugerir desde notas con IA.</div>
    <div class="grid grid-cols-2 gap-4">
      <div class="card">
        <div class="h2 mb-3">Datos del VIP</div>
        <div class="field">
          <label class="label">Title (etiqueta interna)</label>
          <input class="input" value="Tienda Costanera Center · pickup express" />
        </div>
        <div class="field">
          <label class="label">Tier</label>
          <select class="input">
            <option>S — Strategic</option>
            <option selected>A — Premium</option>
            <option>B — Estándar</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="field">
            <label class="label">Deadline time</label>
            <input class="input" type="time" value="16:00" />
          </div>
          <div class="field">
            <label class="label">Minutos de aviso previo</label>
            <input class="input" type="number" value="60" />
          </div>
        </div>
        <div class="field">
          <label class="label">Notas (lenguaje natural)</label>
          <textarea class="input" rows="4">El cliente requiere que se entregue antes de las 4 PM porque la tienda cierra. Avisar al supervisor 1 hora antes si la ETA está atrasada. Es Black Friday — prioridad alta.</textarea>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-yellow">🤖 Sugerir desde notas</button>
          <button class="btn btn-primary">Guardar VIP</button>
          <button class="btn btn-outline">Cancelar</button>
        </div>
      </div>

      <div class="card" style="background: linear-gradient(180deg, rgba(255,203,5,0.06), var(--card));">
        <div class="flex items-center gap-2 mb-3">
          <div style="width:28px;height:28px;border-radius:8px;background:rgba(255,203,5,0.18);display:flex;align-items:center;justify-content:center;">🤖</div>
          <div>
            <div class="h2" style="margin:0;">Razonamiento del LLM</div>
            <div class="text-xs text-muted">Azure OpenAI · gpt-4o-mini · 1.4 s</div>
          </div>
        </div>
        <div class="text-sm" style="line-height: 1.6; color: #d4d4d4;">
          De tu nota infiero <b>tier A — Premium</b> (urgencia comercial alta + Black Friday).
          La frase <i>"antes de las 4 PM"</i> mapea a <code style="color:var(--yellow);">deadline_time = 16:00</code>.
          La instrucción <i>"avisar 1 hora antes"</i> mapea a
          <code style="color:var(--yellow);">alert_minutes_before = 60</code>.
        </div>
        <div class="mt-3">
          <div class="text-xs text-muted">Campos sugeridos</div>
          <div class="flex gap-2 mt-2">
            <span class="chip chip-gold">tier: A</span>
            <span class="chip chip-gold">deadline: 16:00</span>
            <span class="chip chip-gold">aviso: 60 min</span>
            <span class="chip chip-gold">prioridad: alta</span>
          </div>
        </div>
        <div class="mt-3 text-xs text-muted">Confianza global: <b style="color:#4ade80;">0.91</b></div>
        <button class="btn btn-outline mt-3">Aplicar sugerencias</button>
      </div>
    </div>
  `
});
</script>
</body></html>
