<!DOCTYPE html>
<html>
<head>
<style>
html { background: #ffffff; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  background: #1D1D1B;
  display: flex;
  color: #ffffff;
  position: relative;
}
.left-bar {
  position: absolute; left: 0; top: 0;
  width: 12pt; height: 405pt;
  background: #159349;
}
.content {
  margin-left: 60pt; margin-top: 140pt; margin-right: 60pt;
}
.eyebrow {
  font-size: 11pt; letter-spacing: 4pt; color: #159349;
  text-transform: uppercase; font-weight: bold;
  margin: 0 0 18pt 0;
}
h1 {
  font-size: 54pt; font-weight: bold; color: #ffffff;
  margin: 0 0 12pt 0; line-height: 1.05;
}
.subtitle {
  font-size: 22pt; color: #F5F5F5; font-weight: normal;
  margin: 0 0 30pt 0;
}
.meta {
  font-size: 13pt; color: #AAAAAA; margin: 0;
}
.corner-accent {
  position: absolute; right: 0; top: 0;
  width: 180pt; height: 20pt;
  background: #FFCB05;
}
</style>
</head>
<body>
<div class="left-bar"></div>
<div class="corner-accent"></div>
<div class="content">
  <p class="eyebrow">Torre de Control Logística</p>
  <h1>ValueData × Falabella</h1>
  <p class="subtitle">Predicción anticipada de incumplimiento de entregas</p>
  <p class="meta">POC · Abril 2026 · Azure SQL · FastAPI · React · Twilio</p>
</div>
</body>
</html>
